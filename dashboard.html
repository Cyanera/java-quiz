<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة نتائج الاختبار التشخيصي</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap');
  :root{--bg:#0a0c12;--surface:#12151f;--card:#181c28;--border:#252a3a;--accent:#6c63ff;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--text:#e8eaf0;--muted:#7a8099}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:28px 20px 60px}
  .container{max-width:1100px;margin:0 auto}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
  .header h1{font-size:22px;font-weight:700}
  .header p{font-size:13px;color:var(--muted);margin-top:3px}
  .btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;transition:opacity .2s}
  .btn:hover{opacity:.85}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
  .btn-outline:hover{border-color:var(--accent);color:var(--text)}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  @media(max-width:700px){.stats-row{grid-template-columns:repeat(2,1fr)}}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
  .stat-card::before{content:'';position:absolute;top:0;right:0;left:0;height:3px}
  .s-purple::before{background:var(--accent)}.s-green::before{background:var(--green)}.s-yellow::before{background:var(--yellow)}.s-red::before{background:var(--red)}
  .stat-label{font-size:11.5px;color:var(--muted);margin-bottom:6px}
  .stat-value{font-size:30px;font-weight:700}
  .s-purple .stat-value{color:#a78bfa}.s-green .stat-value{color:var(--green)}.s-yellow .stat-value{color:var(--yellow)}.s-red .stat-value{color:var(--red)}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  @media(max-width:750px){.charts-row{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
  .card-title{font-size:14px;font-weight:600;margin-bottom:16px}
  .chart-wrap{position:relative;height:210px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .bar-label{font-size:12px;color:var(--muted);min-width:160px;text-align:right}
  .bar-track{flex:1;height:9px;background:var(--border);border-radius:5px;overflow:hidden}
  .bar-fill{height:100%;border-radius:5px;transition:width .7s ease}
  .bar-pct{font-size:12px;font-weight:600;min-width:34px;text-align:left}
  .comments-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;max-height:260px;overflow-y:auto}
  .comment-item{background:var(--surface);border:1px solid var(--border);border-right:3px solid var(--yellow);border-radius:8px;padding:11px 13px;font-size:13px;line-height:1.6}
  .ai-box{background:var(--surface);border:1px solid rgba(108,99,255,.3);border-radius:10px;padding:16px 18px;font-size:13.5px;line-height:1.9;white-space:pre-wrap}
  .ai-loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:16px 0}
  .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:280px;gap:14px;color:var(--muted)}
  .big-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty .icon{font-size:44px;margin-bottom:12px}
  .ts{font-size:11.5px;color:var(--muted);text-align:center;margin-top:16px}
  .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;margin-right:6px;font-weight:600}
  .tag-weak{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
  .tag-ok{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div><h1>📊 لوحة نتائج الاختبار التشخيصي</h1><p>برمجة متقدمة Java — الترم الصيفي</p></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-outline" id="analyzeBtn" onclick="analyzeWithAI()" style="display:none">🤖 تحليل بالذكاء الاصطناعي</button>
      <button class="btn" onclick="loadData()">🔄 تحديث</button>
    </div>
  </div>
  <div id="main"></div>
  <div class="ts" id="ts"></div>
</div>
<script>
const SCRIPT='https://script.google.com/macros/s/AKfycbxeczltb94L7awVlhU9dCIAk6af9-qsp4MuVzhqLKP9wXWNA-PxiS3YrUsT3ht9Nb4m/exec';
const Q_LABELS=['س1: class vs object','س2: constructor chaining','س3: private access','س4: super()'];
const CORRECT_SUBSTR={q1:'القالب',q2:'Animal ثم Dog',q3:'private',q4:'الأب'};
let globalData=[];
let charts={};

function isCorrect(key,val){return val&&val.toString().includes(CORRECT_SUBSTR[key]);}

async function loadData(){
  document.getElementById('main').innerHTML='<div class="loading-screen"><div class="big-spinner"></div><span>جاري تحميل البيانات...</span></div>';
  try{
    const res=await fetch(SCRIPT+'?action=read&t='+Date.now());
    const json=await res.json();
    if(!json.data||json.data.length<=1){showEmpty();return;}
    const rows=json.data.slice(1).filter(r=>r[0]);
    if(!rows.length){showEmpty();return;}
    globalData=rows.map(r=>({time:r[0],q1:r[1],q2:r[2],q3:r[3],q4:r[4],q5:r[5],q6:r[6],score:parseInt((r[7]||'0').toString())}));
    render(globalData);
    document.getElementById('analyzeBtn').style.display='inline-block';
  }catch(err){
    document.getElementById('main').innerHTML=`<div class="empty"><div class="icon">⚠️</div><div>تعذر تحميل البيانات</div><div style="font-size:12px;margin-top:6px;color:#555">${err.message}</div></div>`;
  }
  document.getElementById('ts').textContent='آخر تحديث: '+new Date().toLocaleTimeString('ar-SA');
}

function showEmpty(){document.getElementById('main').innerHTML='<div class="empty"><div class="icon">📭</div><div>لا توجد إجابات بعد</div></div>';}

function render(data){
  const total=data.length;
  const scores=data.map(d=>d.score);
  const avg=(scores.reduce((a,b)=>a+b,0)/total).toFixed(1);
  const strong=scores.filter(s=>s>=3).length;
  const weak=scores.filter(s=>s<=1).length;
  const qKeys=['q1','q2','q3','q4'];
  const correctPcts=qKeys.map(k=>Math.round(data.filter(d=>isCorrect(k,d[k])).length/total*100));
  const dist=[0,0,0,0,0];
  scores.forEach(s=>{if(s>=0&&s<=4)dist[s]++;});
  const comments=data.map(d=>d.q6).filter(c=>c&&c!=='—'&&c.trim().length>3);

  const weaknessBars=qKeys.map((k,i)=>{
    const pct=correctPcts[i];
    const color=pct<40?'var(--red)':pct<65?'var(--yellow)':'var(--green)';
    const tag=pct<50?'<span class="tag tag-weak">نقطة ضعف</span>':'<span class="tag tag-ok">جيد</span>';
    return `<div class="bar-row"><div class="bar-label">${Q_LABELS[i]}${tag}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div><div class="bar-pct" style="color:${color}">${pct}%</div></div>`;
  }).join('');

  document.getElementById('main').innerHTML=`
    <div class="stats-row">
      <div class="stat-card s-purple"><div class="stat-label">عدد الطالبات</div><div class="stat-value">${total}</div><div class="stat-sub">أكملن الاختبار</div></div>
      <div class="stat-card s-green"><div class="stat-label">متوسط الدرجة</div><div class="stat-value">${avg}</div><div class="stat-sub">من 4 درجات</div></div>
      <div class="stat-card s-yellow"><div class="stat-label">قاعدة جيدة</div><div class="stat-value">${strong}</div><div class="stat-sub">3 أو 4 من 4</div></div>
      <div class="stat-card s-red"><div class="stat-label">تحتاج دعم</div><div class="stat-value">${weak}</div><div class="stat-sub">1 أو أقل من 4</div></div>
    </div>
    <div class="charts-row">
      <div class="card"><div class="card-title">توزيع الدرجات</div><div class="chart-wrap"><canvas id="distChart"></canvas></div></div>
      <div class="card"><div class="card-title">نسبة الإجابات الصحيحة لكل سؤال</div><div class="chart-wrap"><canvas id="qChart"></canvas></div></div>
    </div>
    <div class="card"><div class="card-title">🔴 نقاط الضعف — مرتبة من الأضعف</div>${weaknessBars}</div>
    <div class="card">
      <div class="card-title">💬 ما قالته الطالبات عن صعوباتهن (${comments.length})</div>
      ${comments.length===0?'<div style="color:var(--muted);font-size:13px">لم تُكتب إجابات بعد</div>':`<div class="comments-grid">${comments.map(c=>`<div class="comment-item">${c}</div>`).join('')}</div>`}
    </div>
    <div class="card" id="aiSection" style="display:none"><div class="card-title">🤖 تحليل الذكاء الاصطناعي</div><div id="aiContent"></div></div>`;

  if(charts.dist)charts.dist.destroy();
  if(charts.q)charts.q.destroy();
  charts.dist=new Chart(document.getElementById('distChart').getContext('2d'),{type:'bar',data:{labels:['0','1','2','3','4'],datasets:[{data:dist,backgroundColor:['#ef4444','#f97316','#f59e0b','#84cc16','#22c55e'],borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#7a8099'},grid:{color:'#252a3a'}},y:{ticks:{color:'#7a8099',stepSize:1},grid:{color:'#252a3a'}}}}});
  charts.q=new Chart(document.getElementById('qChart').getContext('2d'),{type:'bar',data:{labels:['س1','س2','س3','س4'],datasets:[{data:correctPcts,backgroundColor:correctPcts.map(p=>p<40?'#ef4444':p<65?'#f59e0b':'#22c55e'),borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#7a8099'},grid:{color:'#252a3a'}},y:{min:0,max:100,ticks:{color:'#7a8099',callback:v=>v+'%'},grid:{color:'#252a3a'}}}}});
}

async function analyzeWithAI(){
  const btn=document.getElementById('analyzeBtn');
  btn.disabled=true;btn.textContent='⏳ جاري التحليل...';
  const aiSection=document.getElementById('aiSection');
  const aiContent=document.getElementById('aiContent');
  aiSection.style.display='block';
  aiContent.innerHTML='<div class="ai-loading"><div class="spinner"></div><span>Claude يحلل إجابات الطالبات...</span></div>';
  aiSection.scrollIntoView({behavior:'smooth'});

  const total=globalData.length;
  const scores=globalData.map(d=>d.score);
  const avg=(scores.reduce((a,b)=>a+b,0)/total).toFixed(1);
  const qKeys=['q1','q2','q3','q4'];
  const qStats=qKeys.map((k,i)=>({label:Q_LABELS[i],pct:Math.round(globalData.filter(d=>isCorrect(k,d[k])).length/total*100)}));
  const constructorAnswers=globalData.map(d=>d.q5).filter(c=>c&&c!=='—'&&c.trim().length>2);
  const difficultyAnswers=globalData.map(d=>d.q6).filter(c=>c&&c!=='—'&&c.trim().length>2);

  const prompt=`أنت مساعد أكاديمي. حلل نتائج هذا الاختبار التشخيصي لطالبات مادة برمجة متقدمة Java.

البيانات الكمية:
- عدد الطالبات: ${total}
- متوسط الدرجة: ${avg} من 4
- نسب الإجابات الصحيحة:
${qStats.map(q=>`  • ${q.label}: ${q.pct}%`).join('\n')}

إجاباتهن على "ما هو Constructor":
${constructorAnswers.length?constructorAnswers.map((a,i)=>`${i+1}. ${a}`).join('\n'):'لا توجد إجابات'}

إجاباتهن على "ما أكثر شيء يربكك":
${difficultyAnswers.length?difficultyAnswers.map((a,i)=>`${i+1}. ${a}`).join('\n'):'لا توجد إجابات'}

المطلوب — اكتب بالعربية:
1. ملخص الوضع العام (جملتان فقط)
2. أبرز 3 نقاط ضعف مشتركة
3. تحليل فهمهن للـ Constructor من إجاباتهن
4. تصنيف الصعوبات من إجاباتهن المفتوحة
5. 3 توصيات محددة للمحاضرة الأولى`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content?.[0]?.text||'تعذر الحصول على التحليل';
    aiContent.innerHTML=`<div class="ai-box">${text}</div>`;
  }catch(err){
    aiContent.innerHTML=`<div style="color:var(--red);font-size:13px">تعذر التحليل: ${err.message}</div>`;
  }
  btn.disabled=false;btn.textContent='🤖 تحليل بالذكاء الاصطناعي';
}

loadData();
</script>
</body>
</html>
